<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#9c3b2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trip" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="manifest" id="pwa-manifest" href="/manifest.webmanifest" />
  <title>Trip Guide</title>
  <script>
    (function () {
      var m = location.pathname.match(/^\/trip\/([^/?#]+)/);
      if (!m) return;
      var id = decodeURIComponent(m[1]);
      var el = document.getElementById('pwa-manifest');
      if (el) el.href = '/trip/' + encodeURIComponent(id) + '/manifest.webmanifest';
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#9c3b2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trip" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Trip Guide</title>
  <script>
    (function () {
      var KEY = 'meroz-pwa-trip';
      var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      var path = location.pathname.replace(/\/$/, '') || '/';

      if (standalone && path === '/') {
        try {
          var saved = localStorage.getItem(KEY);
          if (saved && /^[a-z0-9-]+$/.test(saved)) {
            location.replace('/trip/' + saved);
            return;
          }
        } catch (e) {}
      }

      var m = location.pathname.match(/^\/trip\/([^/?#]+)/);
      if (!m) return;
      var id = decodeURIComponent(m[1]);
      try { localStorage.setItem(KEY, id); } catch (e) {}
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = '/trip/' + encodeURIComponent(id) + '/manifest.webmanifest';
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
